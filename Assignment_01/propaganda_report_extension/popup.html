<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narrative Report Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Narrative Report</h1>
      <p class="subtle">Deep propaganda analysis powered by local models.</p>
    </header>

    <main class="content">
      <div class="glass-card">
        <div class="input-group">
          <label for="model">Ollama Model</label>
          <input id="model" type="text" placeholder="llama3.2:3b" value="llama3.2:3b" />
        </div>

        <div class="input-group">
          <label for="url">Article / Post URL</label>
          <input id="url" type="url" placeholder="https://example.com/article" />
        </div>

        <div class="input-group">
          <label for="text">Manual Text</label>
          <textarea id="text" placeholder="Paste article text, X post text, or notes here..."></textarea>
        </div>

        <div class="button-group">
          <button id="fetchBtn" class="btn secondary">Fetch Source</button>
          <button id="analyzeBtn" class="btn primary">Generate Report</button>
        </div>
      </div>

      <div class="glass-card status-card">
        <label for="sourcePreview">Combined Source</label>
        <textarea id="sourcePreview" class="small" readonly placeholder="Waiting for source..."></textarea>
        <div id="status" class="status align-center">Ready.</div>
      </div>

      <div class="glass-card report-card">
        <div class="report-header">
          <h2>Analysis Result</h2>
          <div class="action-buttons">
            <button id="copyBtn" class="action-btn" title="Copy Markdown">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
            <button id="downloadBtn" class="action-btn" title="Download Markdown">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
          </div>
        </div>
        <div id="reportContainer" class="markdown-body">
          <p class="placeholder-text">Generated report will appear here...</p>
        </div>
        <!-- Hidden textarea to store raw markdown for copying/downloading -->
        <textarea id="report" style="display: none;"></textarea>
      </div>

    </main>
  </div>

  <script src="marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
